services:
  forge-ui:
    # Build context is the forge-ui repo root (sibling of this deploy
    # repo on the dev workstation). On the Pi / GHCR-pull path this service
    # is sourced via docker-compose.prod.yml (image: from GHCR); the build:
    # block here is for local dev (`./setup.sh --source`) and CI build
    # verification.
    build:
      context: ../forge-ui
      args:
        BUILD_VERSION: ${BUILD_VERSION:-0}
        BUILD_SHA: ${BUILD_SHA:-dev}
    container_name: forge-ui
    ports:
      - "${UI_BIND:-127.0.0.1}:${UI_PORT:-4200}:80"
    depends_on:
      forge-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  forge-demo:
    # Public modular demo SPA (forge-ui/Dockerfile.demo) — the API-less Angular
    # bundle the demoApiInterceptor serves entirely from static JSON. Standalone:
    # no API, DB, or storage dependency. Build context is the forge-ui repo root
    # (sibling of this deploy repo on the dev workstation); on the UI box this
    # service is sourced via docker-compose.prod.yml (image: from GHCR) — the
    # build: block is for local dev / CI build verification.
    #
    # profiles: [demo] keeps it OFF on every box unless that box opts in via
    # COMPOSE_PROFILES, so adding it here is inert for the API/AP boxes.
    build:
      context: ../forge-ui
      dockerfile: Dockerfile.demo
      args:
        BUILD_VERSION: ${BUILD_VERSION:-demo}
        BUILD_SHA: ${BUILD_SHA:-demo}
    container_name: forge-demo
    ports:
      - "${DEMO_BIND:-127.0.0.1}:${DEMO_PORT:-4204}:80"
    healthcheck:
      # 127.0.0.1 (not localhost): nginx listens IPv4-only; localhost can resolve
      # to IPv6 [::1] first in some envs and flap the container unhealthy.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - demo
    restart: unless-stopped

  forge-test:
    # Public-facing test/demo SPA (forge-test repo, test-bed/).
    # Build context is the forge-test repo root (sibling of this
    # deploy repo on the dev workstation) because the Angular build's
    # content-compile step reads from <repo>/docs/. On the Pi this
    # service is sourced via docker-compose.prod.yml (image: from GHCR);
    # the build: block here is for local dev / CI build verification.
    build:
      context: ../forge-test
      dockerfile: test-bed/Dockerfile
    container_name: forge-test
    ports:
      - "${TEST_BIND:-127.0.0.1}:${TEST_PORT:-4300}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - test
    restart: unless-stopped

  forge-api:
    # Build context is the forge-api repo root (sibling of this
    # deploy repo on the dev workstation). On the Pi / GHCR-pull path this
    # service is sourced via docker-compose.prod.yml (image: from GHCR); the
    # build: block here is for local dev (`./setup.sh --source`) and CI
    # build verification.
    build:
      context: ../forge-api
      dockerfile: forge.api/Dockerfile
    container_name: forge-api
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - RECREATE_DB=${RECREATE_DB:-false}
      - SEED_DEMO_DATA=${SEED_DEMO_DATA:-false}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD:-}
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST:-forge};Port=${DB_PORT:-5432};Database=${POSTGRES_DB:-forge};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - Jwt__Key=${JWT_KEY:-dev-secret-key-change-in-production-min-32-chars!!}
      - Jwt__Issuer=${JWT_ISSUER:-forge}
      - Jwt__Audience=${JWT_AUDIENCE:-forge-ui}
      # Google SSO: browser sign-in + the token-exchange endpoint federated
      # apps (Tuyere) use to trade a Google id_token for a Forge JWT.
      # AllowedDomains / AdditionalAudiences are NOT env-wired on purpose —
      # a present-but-empty list entry binds as [""] and locks out every SSO
      # login; add them via docker-compose.override.yml (see .env.example).
      - Sso__Google__Enabled=${SSO_GOOGLE_ENABLED:-false}
      - Sso__Google__ClientId=${SSO_GOOGLE_CLIENT_ID:-}
      - Sso__Google__ClientSecret=${SSO_GOOGLE_CLIENT_SECRET:-}
      - Minio__Endpoint=${MINIO_ENDPOINT:-forge-storage:9000}
      - Minio__PublicEndpoint=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - Minio__AccessKey=${MINIO_ROOT_USER:-minioadmin}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD:-minioadmin}
      - Minio__UseSsl=false
      - MockIntegrations=${MOCK_INTEGRATIONS:-false}
      - Storage__Provider=${STORAGE_PROVIDER:-minio}
      - LocalStorage__RootPath=/app/storage
      - LocalStorage__PublicBaseUrl=${LOCAL_STORAGE_PUBLIC_URL:-http://localhost:5000}
      - LocalStorage__PresignedUrlExpirySeconds=${LOCAL_STORAGE_URL_EXPIRY:-3600}
      - Usps__ConsumerKey=${USPS_CONSUMER_KEY:-}
      - Usps__ConsumerSecret=${USPS_CONSUMER_SECRET:-}
      - Ai__BaseUrl=${AI_BASE_URL:-http://forge-ai:11434}
      - Ai__Model=${AI_MODEL:-gemma3:4b}
      - Ai__EmbeddingModel=${AI_EMBEDDING_MODEL:-all-minilm:l6-v2}
      - Ai__DocsPath=/app/docs
      - FrontendBaseUrl=${FRONTEND_BASE_URL:-http://localhost:4200}
      - FormRendererBaseUrl=${FORM_RENDERER_BASE_URL:-http://forge-ui:80}
      - DocuSeal__BaseUrl=${DOCUSEAL_BASE_URL:-http://forge-signing:3000}
      - DocuSeal__PublicBaseUrl=${DOCUSEAL_PUBLIC_BASE_URL:-${FRONTEND_BASE_URL:-http://localhost:4200}/docuseal}
      - DocuSeal__ApiKey=${DOCUSEAL_API_KEY:-}
      - DocuSeal__TimeoutSeconds=${DOCUSEAL_TIMEOUT:-30}
      - DocuSeal__WebhookSecret=${DOCUSEAL_WEBHOOK_SECRET:-}
      - Tts__ApiKey=${TTS_API_KEY:-}
      - Coqui__BaseUrl=${COQUI_BASE_URL:-}
      - Coqui__SpeakerId=${COQUI_SPEAKER_ID:-}
      - Stamps__ApiKey=${STAMPS_API_KEY:-}
      - Stamps__AccountId=${STAMPS_ACCOUNT_ID:-}
      - Stamps__Environment=${STAMPS_ENVIRONMENT:-sandbox}
      - Seq__ServerUrl=${SEQ_SERVER_URL:-}
      - Seq__ApiKey=${SEQ_API_KEY:-}
      - APP_VERSION=${APP_VERSION:-dev}
      - GIT_COMMIT=${GIT_COMMIT:-}
    volumes:
      - ./docs:/app/docs:ro
      - ${LOCAL_STORAGE_PATH:-./storage}:/app/storage
      - ./tools:/app/tools:ro
    depends_on:
      forge:
        condition: service_healthy
      forge-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  forge:
    image: pgvector/pgvector:pg17
    container_name: forge
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-forge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-forge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  forge-storage:
    image: minio/minio
    container_name: forge-storage
    ports:
      - "${MINIO_BIND:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  forge-backup:
    build:
      context: ./backup
    container_name: forge-backup
    restart: unless-stopped
    environment:
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_RUN_ON_START=${BACKUP_RUN_ON_START:-false}
      - POSTGRES_HOST=forge
      - POSTGRES_PORT=5432
      # Default must match the db service / healthcheck / connection string
      # (all :-forge). The old :-forge_db meant a .env without POSTGRES_DB made
      # the backup pg_dump a nonexistent database — a silent backup failure.
      - POSTGRES_DB=${POSTGRES_DB:-forge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_HOST=forge-storage
      - MINIO_PORT=9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      forge:
        condition: service_healthy
      forge-storage:
        condition: service_healthy

  forge-ai:
    image: ollama/ollama
    container_name: forge-ai
    ports:
      - "${AI_BIND:-127.0.0.1}:${AI_PORT:-11434}:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    profiles:
      - ai
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped

  forge-ai-init:
    image: ollama/ollama
    container_name: forge-ai-init
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull gemma3:4b && ollama pull all-minilm:l6-v2 && echo 'AI model init complete'"
    environment:
      - OLLAMA_HOST=http://forge-ai:11434
    depends_on:
      forge-ai:
        condition: service_healthy
    profiles:
      - ai
    restart: "no"

  forge-tts:
    image: ghcr.io/coqui-ai/tts-cpu:latest
    container_name: forge-tts
    ports:
      - "${TTS_BIND:-127.0.0.1}:${TTS_PORT:-5002}:5002"
    volumes:
      - ttsdata:/root/.local/share/tts
    # tts-server serves HTTP on --port; tts (the CLI default entrypoint) exits immediately
    entrypoint: tts-server
    command: --model_name tts_models/en/vctk/vits --port 5002 --use_cuda false
    profiles:
      - tts
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  forge-logs:
    image: datalust/seq:latest
    container_name: forge-logs
    environment:
      - ACCEPT_EULA=Y
      - SEQ_PATHBASE=/logs
      - SEQ_FIRSTRUN_ADMINPASSWORDHASH=${SEQ_ADMIN_PASSWORD_HASH:-}
      - SEQ_FIRSTRUN_ADMINUSERNAME=${SEQ_ADMIN_USERNAME:-admin}
    volumes:
      - seqdata:/data
    profiles:
      - logging
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  forge-signing:
    image: docuseal/docuseal:latest
    container_name: forge-signing
    ports:
      - "${DOCUSEAL_BIND:-127.0.0.1}:${DOCUSEAL_PORT:-3000}:3000"
    volumes:
      - docusealdata:/data
    environment:
      - SECRET_KEY_BASE=${DOCUSEAL_SECRET_KEY:-change-me-in-production}
    profiles:
      - signing
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  ollamadata:
  docusealdata:
  ttsdata:
  seqdata:
