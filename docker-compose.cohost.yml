# Co-host overlay — when qb-engineer runs behind a host-level reverse proxy.
#
# Activated automatically by setup.sh / refresh.sh when QBE_HOSTING_MODE=cohost
# in .env, or when --cohost is passed. The scripts append this file to
# COMPOSE_FILE so it layers over the base.
#
# Use this mode when:
#   - An outer nginx / Caddy on the host terminates TLS and proxies to
#     127.0.0.1:4200 (qb-engineer-ui), and/or
#   - A Cloudflare Tunnel (cloudflared) routes a hostname to 127.0.0.1:4200.
#
# The base docker-compose.yml already binds all services to 127.0.0.1 by
# default, so this overlay does not need to rewrite ports. It exists mainly
# as a marker (label + documentation) and to host any future cohost-only
# tweaks (e.g. stricter resource caps, disabled healthcheck rewrites).
#
# See docs/cohosting.md for the full setup walkthrough.

services:
  qb-engineer-ui:
    labels:
      qb-engineer.hosting-mode: "cohost"

  qb-engineer-api:
    labels:
      qb-engineer.hosting-mode: "cohost"
