# PR + push CI for forge-deploy
#
# This repo holds docker-compose, ops scripts, nginx configs.
# Validation = lint the things we ship: yaml, shell, dockerfiles.
# Heavy "does it actually start" tests are out of scope (need a real host).

name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          set -e
          # Standalone projects — validate alone.
          # docker-compose.yml is the base prod-style stack; docker-compose.demo.yml
          # is the static-only demo project (own services, not an overlay).
          for f in docker-compose.yml docker-compose.demo.yml; do
            echo "Validating $f (standalone)"
            docker compose -f "$f" config --quiet
          done
          # Overlays — must be layered on the base. cohost/dev/export/prod each
          # only redefine fields on services the base owns; standalone validation
          # would error on missing image/build for those services.
          for overlay in docker-compose.cohost.yml docker-compose.dev.yml docker-compose.export.yml docker-compose.prod.yml; do
            echo "Validating docker-compose.yml + $overlay"
            docker compose -f docker-compose.yml -f "$overlay" config --quiet
          done

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_paths: |
            tools/rfid-relay

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3015,DL3018      # apt/apk version pinning warnings — too noisy

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: relaxed
            rules:
              line-length: disable
              comments-indentation: disable
