# Production overlay — replaces local `build:` with prebuilt GHCR images.
#
# This overlay is meant to be applied on the Pi (production host) on top of
# the base docker-compose.yml. The qb-deploy CLI does this automatically:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Image tags are pinned via .env vars (SERVER_IMAGE_TAG / UI_IMAGE_TAG /
# TEST_IMAGE_TAG). qb-deploy rewrites those entries on every deploy and
# rolls them back on healthcheck failure. The default values here are
# `latest` only because docker compose requires a default — qb-deploy
# refuses to deploy `latest` and always pins to an immutable tag
# (main-<sha> or X.Y.Z) before invoking compose.
#
# `build: !reset null` is the Docker Compose 2.24+ syntax that erases the
# `build:` block from the base file. Without this, compose would still try
# to build locally even though we set `image:`.
#
# Local dev keeps the existing build-from-source flow:
#   docker compose up -d --build
#
# See e:/dev/qb-engineer/docs/cicd-design.md for the full CICD design.

services:
  qb-engineer-api:
    image: ghcr.io/danielhokanson/qb-engineer-server:${SERVER_IMAGE_TAG:-latest}
    build: !reset null
    labels:
      qb-engineer.deploy-mode: "prod"

  qb-engineer-ui:
    image: ghcr.io/danielhokanson/qb-engineer-ui:${UI_IMAGE_TAG:-latest}
    build: !reset null
    labels:
      qb-engineer.deploy-mode: "prod"

  # qb-engineer-test — the public-facing test/demo site image. The base
  # docker-compose.yml does not yet define this service (added in a later
  # phase along with the test-site repo's own release.yml). When the test
  # image lands and the base compose gains a qb-engineer-test service,
  # uncomment the block below to start pinning it to a GHCR tag.
  #
  # qb-engineer-test:
  #   image: ghcr.io/danielhokanson/qb-engineer-test:${TEST_IMAGE_TAG:-latest}
  #   build: !reset null
  #   labels:
  #     qb-engineer.deploy-mode: "prod"
