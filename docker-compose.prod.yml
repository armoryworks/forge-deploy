# Production overlay — replaces local `build:` with prebuilt GHCR images.
#
# This overlay is meant to be applied on the Pi (production host) on top of
# the base docker-compose.yml. The forge-deploy CLI does this automatically:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Image tags are pinned via .env vars (SERVER_IMAGE_TAG / UI_IMAGE_TAG /
# TEST_IMAGE_TAG). forge-deploy rewrites those entries on every deploy and
# rolls them back on healthcheck failure. The default values here are
# `latest` only because docker compose requires a default — forge-deploy
# refuses to deploy `latest` and always pins to an immutable tag
# (main-<sha> or X.Y.Z) before invoking compose.
#
# `build: !reset null` is the Docker Compose 2.24+ syntax that erases the
# `build:` block from the base file. Without this, compose would still try
# to build locally even though we set `image:`.
#
# Local dev keeps the existing build-from-source flow:
#   docker compose up -d --build
#
# See e:/dev/forge/docs/cicd-design.md for the full CICD design.

services:
  forge-api:
    image: ghcr.io/danielhokanson/forge-api:${SERVER_IMAGE_TAG:-latest}
    build: !reset null
    labels:
      forge.deploy-mode: "prod"

  forge-ui:
    image: ghcr.io/danielhokanson/forge-ui:${UI_IMAGE_TAG:-latest}
    build: !reset null
    labels:
      forge.deploy-mode: "prod"

  forge-test:
    image: ghcr.io/danielhokanson/forge-test:${TEST_IMAGE_TAG:-latest}
    build: !reset null
    labels:
      forge.deploy-mode: "prod"
