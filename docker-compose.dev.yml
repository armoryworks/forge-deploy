# Development overlay — hot-reload for UI and API
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Or set in .env for persistent dev mode:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
#
# Angular changes reload instantly via ng serve (poll-based file watching).
# .NET changes reload via dotnet watch (automatic rebuild on save).
#
# Port binding: this overlay re-exposes services on 0.0.0.0 (LAN-accessible)
# for easy device testing. The base file binds 127.0.0.1 by default. If you
# only need localhost access, you can omit this overlay or set *_BIND=127.0.0.1
# per service in .env.

services:
  forge-ui:
    build:
      context: ./forge-ui
      dockerfile: Dockerfile.dev
    ports: !override
      - "${UI_PORT:-4200}:80"
    volumes:
      - ./forge-ui:/app
      - ui_node_modules:/app/node_modules
    deploy:
      resources:
        limits:
          memory: 4G

  forge-api:
    build:
      context: ./forge-api
      dockerfile: forge.api/Dockerfile.dev
    ports: !override
      - "${API_PORT:-5000}:8080"
    volumes:
      - ./forge-api:/app
      - ./.git:/app/.git:ro
      - ./tools:/app/tools:ro
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
      - ASPNETCORE_URLS=http://+:8080;http://+:5000
    deploy:
      resources:
        limits:
          memory: 4G

  forge:
    ports: !override
      - "${POSTGRES_PORT:-5432}:5432"

  forge-storage:
    ports: !override
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  ui_node_modules:
