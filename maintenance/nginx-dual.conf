# Dual-port maintenance server — serves the maintenance page on BOTH :80 and
# :443 directly (no HTTP→HTTPS redirect), so that whichever port the real UI
# was exposing AND whichever port the user's browser attempts (HTTPS-Only Mode
# upgrade, cached HSTS, etc.) gets a working response.
#
# Port 443 uses a self-signed cert generated at container startup. Browsers
# will show a cert warning, which is strictly better than "can't connect".

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;
    root /usr/share/nginx/html;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }
}
