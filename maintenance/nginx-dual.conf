# Dual-port maintenance server — serves the maintenance page on BOTH :80 and
# :443 directly (no HTTP→HTTPS redirect), so that whichever port the real UI
# was exposing AND whichever port the user's browser attempts (HTTPS-Only Mode
# upgrade, cached HSTS, etc.) gets a working response.
#
# Port 443 uses a self-signed cert generated at container startup. Browsers
# will show a cert warning, which is strictly better than "can't connect".

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers — maintenance window shouldn't blow a hole in the scan grade
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;
    root /usr/share/nginx/html;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store" always;
    }
}
